# =====================================================================
# navsat_transform_node
# Converte /fix (sensor_msgs/NavSatFix, lat/lon) em x/y locais,
# publicados como nav_msgs/Odometry (remapeado para /gps/odom).
# Parametros no nivel raiz (carregado dentro do <node name="navsat_transform_node">).
# =====================================================================
frequency: 30.0
delay: 3.0
magnetic_declination_radians: 0.0
yaw_offset: 0.0
zero_altitude: true
broadcast_utm_transform: false
publish_filtered_gps: true
use_odometry_yaw: false
wait_for_datum: false
