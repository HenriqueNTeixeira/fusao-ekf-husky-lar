# =====================================================================
# Configuracao 2: ODOMETRIA + IMU
# Parametros no nivel raiz (carregado dentro do <node name="ekf_filter_node">).
# =====================================================================
frequency: 30.0
sensor_timeout: 0.1
two_d_mode: true

map_frame: map
odom_frame: odom
base_link_frame: base_link
world_frame: odom

publish_tf: true
print_diagnostics: true

# ---- odom0 = odometria das rodas (velocidades) ----
odom0: /wheel/odom
odom0_config: [false, false, false,
               false, false, false,
               true,  true,  false,
               false, false, true,
               false, false, false]
odom0_differential: false
odom0_relative: false
odom0_queue_size: 10

# ---- imu0 = IMU (/imu/data): yaw, vyaw e ax ----
imu0: /imu/data
imu0_config: [false, false, false,
              false, false, true,
              false, false, false,
              false, false, true,
              true,  false, false]
imu0_differential: false
imu0_relative: false
imu0_queue_size: 10
imu0_remove_gravitational_acceleration: true
